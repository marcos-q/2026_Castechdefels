site_name: CasTECHdefels 2026. Projectes connectats... amb el soldador a la mà.
site_description: Guia de pràctiques i exemples de programació amb dificultat creixent.
site_author: Marcos Quílez

theme:
  name: material
  language: ca # Configura la interfaz de la web en catalán (botones de búsqueda, siguiente, etc.)
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Canvia a mode fosc
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Canvia a mode clar
  features:
    - navigation.tabs # Menú superior per a les grans seccions
    - navigation.sections # Menú lateral organitzat per blocs
    - content.code.copy # Botó per copiar el codi
    - toc.integrate # Mou l'índex de la dreta al menú de l'esquerra

plugins:
  - search # Activa el buscador automático dentro de la web

# --- AQUÍ DEFINES EL ORDEN Y LA ESTRUCTURA DEL MENÚ ---
nav:
  - Benvinguda: index.md
  
  - Actuadors i Sortides:
    - LED Digital (El Batec): led_digital.md
    - LED Analògic (PWM): led_analogic_PWM.md
    - Efecte Respiració: respiracio_delay.md
    # En el futuro, si añades un zumbador, solo creas "brunzidor.md" y lo pones aquí:
    # - Brunzidors i Sons: brunzidor.md

  - Visualització:
    - Introducció a les pantalles OLED: pantalles_oled.md
    - Disseny de gràfics i icones: oled_grafics.md

  - Sensors i Comunicació I2C:
    - Com funciona el bus I2C?: bus_i2c.md
    - Lectura de sensors ambientals: sensors_ambientals.md

  - Connectivitat i IoT:
    - Configuració Wi-Fi: connexio_wifi.md
    - Creació d'un Bot de Telegram: bot_telegram.md
    - Alertes de la mascota: telegram_alertes.md